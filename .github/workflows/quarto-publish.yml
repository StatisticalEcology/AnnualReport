name: Render and Publish Quarto Site

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 4 * * *"  # 04:00 UTC = 06:00 Africa/Johannesburg
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Install R packages
        run: |
          Rscript -e 'pkgs <- c(
            "googlesheets4",
            "dplyr",
            "DT",
            "lubridate",
            "tidyr",
            "readr",
            "ggplot2",
            "scales",
            "knitr"
          ); install.packages(pkgs, repos="https://cloud.r-project.org"); missing <- pkgs[!vapply(pkgs, requireNamespace, logical(1), quietly = TRUE)]; if (length(missing)) stop("Missing packages after install: ", paste(missing, collapse = ", "))'

      - name: Render site
        run: quarto render

      - name: Publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
