name: Render and Publish Quarto Site

on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 4 * * *"  # 04:00 UTC = 06:00 Africa/Johannesburg
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("googlesheets4","dplyr","DT","lubridate"), repos="https://cloud.r-project.org")'

      - name: Render site
        run: quarto render

      - name: Publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
